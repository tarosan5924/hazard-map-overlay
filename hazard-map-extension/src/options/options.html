<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ハザードマップオーバーレイ 設定</title>
  <style>
    body { font-family: sans-serif; padding: 16px; max-width: 900px; }
    h1 { font-size: 1.2rem; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
    th, td { border: 1px solid #ccc; padding: 6px 8px; font-size: 0.85rem; }
    th { background: #f5f5f5; text-align: left; }
    input[type="text"] { width: 100%; box-sizing: border-box; font-size: 0.85rem; padding: 2px 4px; }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    button { padding: 6px 14px; font-size: 0.85rem; cursor: pointer; }
    #status { color: green; font-size: 0.85rem; min-height: 1.2em; }
    #status.error { color: red; }
  </style>
</head>
<body>
  <h1>ハザードマップオーバーレイ 設定</h1>

  <table id="selectors-table">
    <thead>
      <tr>
        <th>ドメイン</th>
        <th>住所抽出セレクタ</th>
        <th>挿入先セレクタ</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="selectors-body"></tbody>
  </table>

  <div class="btn-row">
    <button id="btn-add">行を追加</button>
    <button id="btn-save">保存</button>
    <button id="btn-export">JSONエクスポート</button>
    <label style="cursor:pointer">
      <button type="button" onclick="document.getElementById('import-input').click()">JSONインポート</button>
      <input type="file" id="import-input" accept=".json" style="display:none">
    </label>
    <button id="btn-reset">デフォルトに戻す</button>
  </div>

  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
